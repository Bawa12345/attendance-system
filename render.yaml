services:
  - type: web
    name: attendance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false           # You will paste the JSON content manually in Render dashboard
